name: DriveBidRent CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'React_DriveBidRent_2/**'
      - '.github/workflows/drivebidrent-cicd.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'React_DriveBidRent_2/**'
      - '.github/workflows/drivebidrent-cicd.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: drivebidrent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: React_DriveBidRent_2/Backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./React_DriveBidRent_2/Backend
        run: npm ci

      - name: Run backend unit tests
        working-directory: ./React_DriveBidRent_2/Backend
        run: npm run test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: React_DriveBidRent_2/client/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./React_DriveBidRent_2/client
        run: npm ci

      - name: Build frontend
        working-directory: ./React_DriveBidRent_2/client
        run: npm run build

  deploy-verify:
    name: Verify Deployment (Render)
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Wait for Render auto-deploy
        run: |
          echo "Render auto-deploys on push to main."
          echo "Waiting 60s for deployment to propagate..."
          sleep 60

      - name: Verify Backend is live
        run: |
          echo "Checking backend at https://drivebidrent.onrender.com/api/home/data"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://drivebidrent.onrender.com/api/home/data || true)
            echo "  Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy!"
              break
            fi
            if [ "$i" = "5" ]; then
              echo "Backend health check failed after 5 attempts."
              exit 1
            fi
            sleep 30
          done

      - name: Verify Frontend is live
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://drivebidrent.onrender.com || true)
          echo "Frontend HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]; then
            echo "Frontend is live!"
          else
            echo "Frontend check returned HTTP $STATUS"
            exit 1
          fi

      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  DriveBidRent — Deployment Verified"
          echo "============================================"
          echo "  Backend:  https://drivebidrent.onrender.com"
          echo "  Status:   LIVE"
          echo "============================================"
