name: DriveBidRent CI/CD

on:
  push:
    branches: [main, master]
    paths:
      - 'React_DriveBidRent_2/**'
      - '.github/workflows/drivebidrent-cicd.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'React_DriveBidRent_2/**'
      - '.github/workflows/drivebidrent-cicd.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: drivebidrent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: React_DriveBidRent_2/Backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./React_DriveBidRent_2/Backend
        run: npm ci

      - name: Run backend unit tests
        working-directory: ./React_DriveBidRent_2/Backend
        run: npm run test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: React_DriveBidRent_2/client/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./React_DriveBidRent_2/client
        run: npm ci

      - name: Build frontend
        working-directory: ./React_DriveBidRent_2/client
        run: npm run build
